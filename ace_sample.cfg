# 请确认 [save_variables] 位于 [ace] 之前（如果使用不同配置文件）
[save_variables]
filename: ~/vars.cfg

[respond]

[ace]
serial: /dev/serial/by-id/usb-ANYCUBIC_ACE_1-if00
baud: 115200
# 禁用日志记录，默认 True
#disable_logging: True
#log_dir: ~/printer_data/logs
# 日志级别：DEBUG - 调试信息，INFO - 主要事件，WARNING - 警告，ERROR - 错误
#log_level: DEBUG
# 最大日志文件大小（Mb）
#max_log_size: 10
# 旧日志保留数量
#log_backup_count: 3
# 串口超时参数
# response_timeout: 2.0
# read_timeout: 0.1
# write_timeout: 0.5
# 最大队列大小，默认 20 条消息
max_queue_size: 20
# 默认送料速度，出厂范围 10-25
feed_speed: 25
# 默认回抽速度，出厂范围 10-25
retract_speed: 25
# 换料时的回抽长度
toolchange_retract_length: 100
# 送至打印头的触碰计数，默认 5，如果系统稳定运行可适当降低该值
park_hit_count: 5
# 干燥机最高温度。如果你想烧坏干燥机，那就试试！（开个玩笑，建议在 60 度左右较为安全，但未经充分测试）
max_dryer_temperature: 55
# 换料后禁用送料辅助。默认为 True
disable_assist_after_toolchange: True


[gcode_macro _ACE_PRE_TOOLCHANGE]
gcode:
    # 空操作
    # 准备换料
    M117 准备换料
    {% set T = 220 %}
    {% if printer.extruder.target != 0 %} # 如果挤出机已设目标温度
        {% if printer.extruder.temperature < printer.extruder.target %} # 如果未达到，加热
#            M118 从 {printer.extruder.temperature} 加热至 {printer.extruder.target}。
            SET_HEATER_TEMPERATURE HEATER=extruder TARGET={printer.extruder.target|float}
            TEMPERATURE_WAIT SENSOR=extruder MINIMUM={printer.extruder.target|float} 
        {% endif %}
    {% else %} # 如果挤出机没有目标温度
        {% if printer.extruder.target < T %}  # 加热至 T。
#            M118 无目标温度，加热至 {T}。
            SET_HEATER_TEMPERATURE HEATER=extruder TARGET={T}
            TEMPERATURE_WAIT SENSOR=extruder MINIMUM={T}
        {% endif %}
    {% endif %}
    {% if "xyz" not in printer.toolhead.homed_axes %}
        G28
        SAVE_GCODE_STATE NAME=FILAMENT_CHANGE_STATE
    {% else %}
        SAVE_GCODE_STATE NAME=FILAMENT_CHANGE_STATE
    {% endif %}
    {% if params.FROM is defined %}
        {% set from_index = params.FROM|int %}
        {% if from_index != -1 %}
            # 保存选定的槽位
            #{% set from_index = params.FROM|int %}
            # 报告停止送料辅助
            M118 槽位 {from_index} 送料辅助已禁用
            # 停止选定槽位的送料辅助
	        ACE_DISABLE_FEED_ASSIST INDEX={from_index}
        {% endif %}
    {% else %}
        # 如果未指定槽位，报告错误
        {action_respond_info("索引缺失")}
        RESPOND TYPE=error MSG="错误：INDEX 缺失"
    {% endif %}
#   修剪耗材
    {% set max_z = printer.toolhead.axis_maximum.z|float %}
    {% set act_z = printer.toolhead.position.z|float %}
    {% if act_z < (max_z - 5.0) %}
        {% set Z = 5.0 %}
    {% else %}
        {% set Z = max_z - act_z %}
    {% endif %}
    G91                        ; 相对移动，安全抬升 Z
    G1 Z{Z}                    ; 安全抬升
    G90                        ; 绝对移动，用于停车
    {% if from_index != -1 %}
        G1 X{245} Y{0} F7800    ; 移至切料位置
    {% endif %}       
#   移至清理区域
    G1 X-8 Y0 F7800
    G91
    {% if from_index != -1 %}
        G1 E-70 F300
    {% endif %}
    G90

[gcode_macro _ACE_POST_TOOLCHANGE]
gcode:
    # 空操作
    M117 换料后操作
    # 换料后操作
    {% if params.TO is defined %}
        # 保存选定的槽位
        {% set to_index = params.TO|int %}
        {% if to_index != -1 %}
            G91
            G1 E100 F300
            G90
            G1 X5 Y0 F7800
            G1 X-8 Y0 F7800
        {% endif %}
    {% else %}
        # 如果未指定槽位，报告错误
        {action_respond_info("索引缺失")}
        RESPOND TYPE=error MSG="错误：INDEX 缺失"
    {% endif %}

    {% if to_index != -1 %}
        # 报告开始送料辅助
        M118 槽位 {to_index} 送料辅助已启用
        # 启动选定槽位的送料辅助
	    ACE_ENABLE_FEED_ASSIST INDEX={to_index}
    {% endif %}
    RESTORE_GCODE_STATE NAME=FILAMENT_CHANGE_STATE MOVE=1 MOVE_SPEED=1500

[gcode_macro _ACE_ON_EMPTY_ERROR]
gcode:
    {action_respond_info("料盘已空")}
    {% if printer.idle_timeout.state == "Printing" %}
        PAUSE
    {% endif %}

[gcode_macro ENABLE_FEED_ASSIST]
gcode:
    # 检查是否指定了槽位
    {% if params.INDEX is defined %}
        # 保存选定的槽位
        {% set target_index = params.INDEX|int %}
         # 报告开始送料辅助
        M118 槽位 {target_index} 送料辅助已启用
        # 启动选定槽位的送料辅助
	    ACE_ENABLE_FEED_ASSIST INDEX={target_index}
    {% else %}
        # 如果未指定槽位，报告错误
        {action_respond_info("索引缺失")}
        RESPOND TYPE=error MSG="错误：INDEX 缺失"
    {% endif %}


[gcode_macro DISABLE_FEED_ASSIST]
gcode:
    # 检查是否指定了槽位
    {% if params.INDEX is defined %}
        # 保存选定的槽位
        {% set target_index = params.INDEX|int %}
         # 报告停止送料辅助
        M118 槽位 {target_index} 送料辅助已禁用。
        # 停止选定槽位的送料辅助
	    ACE_DISABLE_FEED_ASSIST INDEX={target_index}

    {% else %}
        # 如果未指定槽位，则报错，并依次禁用所有槽位的辅助
        {action_respond_info("索引缺失")}
        ACE_DISABLE_FEED_ASSIST INDEX=0
        G4 P1000
        ACE_DISABLE_FEED_ASSIST INDEX=1
        G4 P1000
        ACE_DISABLE_FEED_ASSIST INDEX=2
        G4 P1000
        ACE_DISABLE_FEED_ASSIST INDEX=3
        G4 P1000
    {% endif %}

[gcode_macro PARK_TO_TOOLHEAD]
gcode:
    # 检查是否指定了槽位
    {% if params.INDEX is defined %}
        # 保存选定的槽位
        {% set target_index = params.INDEX|int %}
        # 报告开始停车
        M118 开始将槽位 {target_index} 耗材送至打印头
        # 启动选定槽位的停车操作
	    ACE_PARK_TO_TOOLHEAD INDEX={target_index}

    {% else %}
        # 如果未指定槽位，报告错误
        {action_respond_info("索引缺失")}
        RESPOND TYPE=error MSG="错误：INDEX 缺失"
    {% endif %}
	
   

[gcode_macro START_DRYING]
gcode:
    # 检查是否指定了温度
    {% if params.TEMP is defined %}
        # 保持设定的温度
        {% set target_temp = params.TEMP|int %}
    {% else %}
        # 如果未指定温度，使用默认值（例如 55 度）
        {% set target_temp = 55 %}
    {% endif %}
	# 检查是否指定了时间
    {% if params.TIME is defined %}
        # 保存设定的时间（分钟）
        {% set target_time = params.TIME|int %}
    {% else %}
        # 如果未指定时间，使用默认值（例如 120 分钟）
        {% set target_time = 120 %}
    {% endif %}
    # 报告开始干燥
    M117 已开始干燥耗材，温度 {target_temp}°C，持续时间 {target_time} 分钟。
    # 使用指定参数开始干燥
	ACE_START_DRYING TEMP={target_temp} DURATION={target_time}

[gcode_macro STOP_DRYING]
gcode: 
    ACE_STOP_DRYING
    M117 耗材干燥已停止。风扇将继续运行直至加热器完全冷却。
    
[gcode_macro TR]
gcode:
    ACE_CHANGE_TOOL TOOL=-1
    
[gcode_macro T0]
gcode:
    ACE_CHANGE_TOOL TOOL=0

[gcode_macro T1]
gcode:
    ACE_CHANGE_TOOL TOOL=1

[gcode_macro T2]
gcode:
    ACE_CHANGE_TOOL TOOL=2

[gcode_macro T3]
gcode:
    ACE_CHANGE_TOOL TOOL=3

# 无限料盘宏
[gcode_macro SET_INFINITY_SPOOL_ORDER]
gcode:
    # 设置无限料盘模式的槽位顺序
    # 用法: SET_INFINITY_SPOOL_ORDER ORDER="0,1,2,3"
    # 使用 'none' 表示空槽位: ORDER="0,1,none,3"
    {% if params.ORDER is defined %}
        {% set order = params.ORDER|string %}
        ACE_SET_INFINITY_SPOOL_ORDER ORDER={order}
    {% else %}
        {action_respond_info("需要 ORDER 参数")}
        RESPOND TYPE=error MSG="错误：需要 ORDER 参数"
        RESPOND MSG="用法: SET_INFINITY_SPOOL_ORDER ORDER=\"0,1,2,3\""
        RESPOND MSG="使用 'none' 表示空槽位: ORDER=\"0,1,none,3\""
    {% endif %}

[gcode_macro RESET_INFINITY_SPOOL]
gcode:
    # 重置无限料盘位置（从头开始）
    SAVE_VARIABLE VARIABLE=ace_infsp_position VALUE=0
    {action_respond_info("无限料盘位置已重置到起始位置")}

[gcode_macro _ACE_PRE_INFINITYSPOOL]
gcode:
    # 无限料盘模式下换料前执行的宏
    # 默认为空，可根据需要自定义
    M117 无限料盘: 正在更换料盘

[gcode_macro _ACE_POST_INFINITYSPOOL]
gcode:
    # 无限料盘模式下换料后执行的宏
    # 默认为空，可根据需要自定义
    M117 无限料盘: 料盘已更换

# ACE 设备的温度传感器
# 此传感器从 ACE 模块状态读取温度
# 注意：模块必须安装在 klippy/extras/temperature_ace.py 中
# 首先，加载 temperature_ace 模块（注册传感器工厂）
[temperature_ace]

# 然后将其用作温度传感器
[temperature_sensor ValgAce]
sensor_type: temperature_ace
# 可选：最低温度（默认：0）
#min_temp: 0
# 可选：最高温度（默认：100）
#max_temp: 100