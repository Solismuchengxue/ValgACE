server {
    listen 88;
    server_name ace-dashboard.local;  # 替换为您的域名或IP
    
    root /home/loki/ace_dash;  # dashboard文件路径
    index index.html;
    
    # 日志记录
    access_log /var/log/nginx/ace-dashboard-access.log;
    error_log /var/log/nginx/ace-dashboard-error.log;
    
    # 主文件
    location / {
        try_files $uri $uri/ /index.html;
    }
    
    # 静态文件
    location ~* \.(css|js|png|jpg|jpeg|gif|ico|svg)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
    
    # 代理API请求到Moonraker
    location /server/ {
        proxy_pass http://localhost:7125;
        proxy_http_version 1.1;
        
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # WebSocket超时
        proxy_read_timeout 86400;
        proxy_send_timeout 86400;
    }
    
    # 代理WebSocket
    location /websocket {
        proxy_pass http://localhost:7125/websocket;
        proxy_http_version 1.1;
        
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # WebSocket超时
        proxy_read_timeout 86400;
        proxy_send_timeout 86400;
    }
}
