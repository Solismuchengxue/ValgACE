# 如果使用自定义配置文件，请确保 [save_variables] 位于 [ace] 之上
[save_variables]
filename: ~/printer_data/config/vars.cfg

[respond]

[ace]
serial: /dev/serial/by-id/usb-ANYCUBIC_ACE_1-if00
baud: 115200
# 默认送料速度，出厂默认范围为 10-25
feed_speed: 25
# 默认退料速度，出厂默认范围为 10-25
retract_speed: 25
# 默认退料模式，0（普通模式），1（增强模式）
retract_mode: 0
# 换色/换刀时的退料长度
toolchange_retract_length: 100
# 喷头碰触计数（用于确认停车位置），默认为 5。若设备在较低数值下运行稳定，可适当调低
park_hit_count: 5
# 烘干最高温度。~60℃ 理论上安全（尚未充分测试，请谨慎设置以免损坏设备）
max_dryer_temperature: 55
# 换刀后禁用辅助送料功能。默认为 False（即保持启用）
disable_assist_after_toolchange: False
# 无限料盘模式（Infinity Spool）开关
infinity_spool_mode: False
#filament_sensor: FilamentSensor
aggressive_parking: False
max_parking_distance: 100
parking_speed: 10
# 基于传感器检测的停车超时额外等待时间（秒）
extended_park_time: 10
# 停车完成的最大超时时间（秒）
max_parking_timeout: 60
# 打印过程中通信中断时调用的宏名称（默认：PAUSE）
set_pause_macro_name: PAUSE

[gcode_macro STATUS_ACE]
gcode:
    ACE_STATUS
[gcode_macro HELP_ACE]
gcode:
    ACE_GET_HELP

[gcode_macro _ACE_PRE_TOOLCHANGE]
gcode:
    # 空操作/占位宏
    M118 准备更换耗材

[gcode_macro _ACE_POST_TOOLCHANGE]
gcode:
    # 空操作/占位宏
    M118 耗材更换后处理

[gcode_macro _ACE_PRE_INFINITYSPOOL]
gcode:
    # 空操作/占位宏
    M118 准备更换耗材

[gcode_macro _ACE_POST_INFINITYSPOOL]
gcode:
    # 空操作/占位宏
    M118 耗材更换后处理

[gcode_macro _ACE_RESET_INFINITYSPOOL]
gcode:
    # 空操作/重置计数器
    SAVE_VARIABLE VARIABLE=ace_infsp_counter VALUE=1

[gcode_macro _ACE_ON_EMPTY_ERROR]
gcode:
    {action_respond_info("Spool is empty")}
    {% if printer.idle_timeout.state == "Printing" %}
        PAUSE
    {% endif %}

[gcode_macro FEED_ACE]
gcode:
    # 检查是否指定了料槽
    {% if params.INDEX and params.LENGTH is defined %}
        # 获取指定的料槽参数
        {% set target_index = params.INDEX|int %}
        {% set target_length = params.LENGTH|int %}
        {% if params.SPEED is defined %} 
            {% set target_speed = params.SPEED|int %}
        {% else %}
            {% set target_speed = 25 %}
        {% endif %}
         # 控制台提示送料状态
        M118 已启用料槽 {target_index} 的送料功能

        # 执行指定料槽的送料指令
	    ACE_FEED INDEX={target_index} LENGTH={target_length} SPEED={target_speed}

    {% else %}
        # 若未指定料槽，则报错
        {action_respond_info("Index or Length is lost")}
        RESPOND TYPE=error MSG="Error INDEX or LENGTH is lost"
    {% endif %}

[gcode_macro RETRACT_ACE]
gcode:
    # 检查是否指定了料槽
    {% if params.INDEX and params.LENGTH is defined %}
        # 获取指定的料槽参数
        {% set target_index = params.INDEX|int %}
        {% set target_length = params.LENGTH|int %}
        {% if params.SPEED is defined %} 
            {% set target_speed = params.SPEED|int %}
        {% else %}
            {% set target_speed = 25 %}
        {% endif %}
         # 控制台提示退料状态
        M118 已启用料槽 {target_index} 的送料功能

         # 执行指定料槽的退料指令
	    ACE_RETRACT INDEX={target_index} LENGTH={target_length} SPEED={target_speed}

    {% else %}
        # 若未指定料槽，则报错
        {action_respond_info("Index or Length is lost")}
        RESPOND TYPE=error MSG="Error INDEX or LENGTH is lost"
    {% endif %}

[gcode_macro ENABLE_FEED_ASSIST]
gcode:
    # 检查是否指定了料槽
    {% if params.INDEX is defined %}
         # 获取指定的料槽参数
        {% set target_index = params.INDEX|int %}
         # 控制台提示辅助送料状态
        M118 已启用料槽 {target_index} 的送料功能

        # 执行指定料槽的辅助送料指令
	    ACE_ENABLE_FEED_ASSIST INDEX={target_index}

    {% else %}
        # 若未指定料槽，则报错
        {action_respond_info("Index is lost")}
        RESPOND TYPE=error MSG="Error INDEX is lost"
    {% endif %}


[gcode_macro DISABLE_FEED_ASSIST]
gcode:
    # 检查是否指定了料槽
    {% if params.INDEX is defined %}
        # 获取指定的料槽参数
        {% set target_index = params.INDEX|int %}
         # 控制台提示辅助送料状态
        M118 料槽 {target_index} 的送料已关闭.

        # 执行指定料槽的辅助送料禁用指令
	    ACE_DISABLE_FEED_ASSIST INDEX={target_index}

    {% else %}
        # 若未指定料槽，则默认禁用所有料槽 (0-3)
        {action_respond_info("Index is lost")}
        ACE_DISABLE_FEED_ASSIST INDEX=0
        G4 P1000
        ACE_DISABLE_FEED_ASSIST INDEX=1
        G4 P1000
        ACE_DISABLE_FEED_ASSIST INDEX=2
        G4 P1000
        ACE_DISABLE_FEED_ASSIST INDEX=3
        G4 P1000
    {% endif %}

[gcode_macro PARK_TO_TOOLHEAD]
gcode:
    # 检查是否指定了料槽
    {% if params.INDEX is defined %}
        # 获取指定的料槽参数
        {% set target_index = params.INDEX|int %}
          # 控制台提示停车状态
        M118 已开始料槽 {target_index} 的喷头停车

        # 执行指定料槽的喷头停车指令
	    ACE_PARK_TO_TOOLHEAD INDEX={target_index}

    {% else %}
        # 若未指定料槽，则报错
        {action_respond_info("Index is lost")}
        RESPOND TYPE=error MSG="Error INDEX is lost"
    {% endif %}

[gcode_macro START_DRYING]
gcode:
    # 检查是否指定了温度
    {% if params.TEMP is defined %}
        # 获取指定的温度参数
        {% set target_temp = params.TEMP|int %}
    {% else %}
        # 若未指定温度，则使用默认值（55℃）
        {% set target_temp = 55 %}
    {% endif %}
	# 检查是否指定了时间
    {% if params.TIME is defined %}
         # 获取指定的时间参数（分钟）
        {% set target_time = params.TIME|int %}
    {% else %}
        # 若未指定时间，则使用默认值（120分钟）
        {% set target_time = 120 %}
    {% endif %}
	
    # 控制台提示烘干状态
    M118 耗材烘干已启动，温度 {target_temp}°C，时长 {target_time} 分钟

     # 执行带参烘干指令
	ACE_START_DRYING TEMP={target_temp} DURATION={target_time}

[gcode_macro STOP_DRYING]
gcode: 
    ACE_STOP_DRYING
    M118 耗材烘干已停止。风扇将继续运行直至加热器完全冷却。
    
[gcode_macro TR]
gcode:
    ACE_CHANGE_TOOL TOOL=-1
    
[gcode_macro T0]
gcode:
    ACE_CHANGE_TOOL TOOL=0

[gcode_macro T1]
gcode:
    ACE_CHANGE_TOOL TOOL=1

[gcode_macro T2]
gcode:
    ACE_CHANGE_TOOL TOOL=2

[gcode_macro T3]
gcode:
    ACE_CHANGE_TOOL TOOL=3

[gcode_macro INFINITY_SPOOL]
gcode:
    ACE_INFINITY_SPOOL

# 一次性设置所有料槽的映射关系
# 用法示例：
#   SET_ALL_SLOTMAPPING S0=2 S1=0 S2=1 S3=3  ; T0→2, T1→0, T2→1, T3→3
#   SET_ALL_SLOTMAPPING                       ; 恢复默认映射: T0→0, T1→1, T2→2, T3→3
[gcode_macro SET_ALL_SLOTMAPPING]
description: 一次性设置所有料槽的映射关系
gcode:
    # 参数说明：S0, S1, S2, S3 分别对应索引 0-3 的料槽
    {% set s0 = params.S0|default(0)|int %}
    {% set s1 = params.S1|default(1)|int %}
    {% set s2 = params.S2|default(2)|int %}
    {% set s3 = params.S3|default(3)|int %}
    
    # 验证参数有效性（值必须在 0-3 之间）
    {% if s0 < 0 or s0 > 3 or s1 < 0 or s1 > 3 or s2 < 0 or s2 > 3 or s3 < 0 or s3 > 3 %}
        {action_respond_info("Error: Slot values must be between 0 and 3")}
        RESPOND TYPE=error MSG="Error: Slot values must be between 0 and 3"
    {% else %}
        ACE_SET_SLOTMAPPING INDEX=0 SLOT={s0}
        ACE_SET_SLOTMAPPING INDEX=1 SLOT={s1}
        ACE_SET_SLOTMAPPING INDEX=2 SLOT={s2}
        ACE_SET_SLOTMAPPING INDEX=3 SLOT={s3}
        
        M118 料槽映射已设置为：[{s0}, {s1}, {s2}, {s3}]
    {% endif %}
